services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: pangpang_reward
      POSTGRES_USER: pangpang
      POSTGRES_PASSWORD: pangpang_password
    volumes:
      - pangpang_postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pangpang -d pangpang_reward"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://pangpang:pangpang_password@postgres:5432/pangpang_reward?schema=public
      NEXT_PUBLIC_APP_NAME: 胖胖奖励管理
    ports:
      - "3000:3000"

volumes:
  pangpang_postgres:
